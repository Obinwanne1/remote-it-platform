{% extends 'base.html' %}
{% block title %}Submit Ticket{% endblock %}

{% block content %}
<div class="portal-layout">
    <div class="page-header">
        <h2>Submit Support Ticket</h2>
        <a href="{{ url_for('client.portal') }}" class="btn btn-outline">&#8592; Back to Portal</a>
    </div>
    <div class="card form-card">
        <form method="POST">
            <div class="form-group">
                <label>Title *</label>
                <input type="text" name="title" required placeholder="Brief description of the issue">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Category</label>
                    <select name="category">
                        {% for cat in categories %}
                        <option value="{{ cat }}">{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select name="priority">
                        <option value="P4">P4 — Low (72h SLA)</option>
                        <option value="P3" selected>P3 — Normal (24h SLA)</option>
                        <option value="P2">P2 — High (4h SLA)</option>
                        <option value="P1">P1 — Critical (1h SLA)</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Description *</label>
                <textarea name="description" rows="6" required
                    placeholder="Describe the issue in detail. Include: what happened, when it started, what you've tried."></textarea>
            </div>
            <div class="form-actions">
                <a href="{{ url_for('client.portal') }}" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-primary">Submit Ticket</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
