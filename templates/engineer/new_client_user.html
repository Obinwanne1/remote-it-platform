{% extends 'base.html' %}
{% block title %}Add User — {{ client.name }}{% endblock %}

{% block content %}
<div class="layout">
    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="{{ url_for('engineer.client_detail', client_id=client.id) }}" class="nav-item">&#8592; {{ client.name }}</a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="page-header"><h2>Add User to {{ client.name }}</h2></div>
        <div class="card form-card">
            <form method="POST">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="name" required placeholder="Jane Smith">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" name="email" required placeholder="jane@acmecorp.com">
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" name="password" required minlength="8">
                    <small class="form-hint">Min 8 characters. Share securely with user.</small>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select name="role">
                        <option value="client_staff">Staff (submit tickets)</option>
                        <option value="client_admin">Admin (manage users)</option>
                    </select>
                </div>
                <div class="form-actions">
                    <a href="{{ url_for('engineer.client_detail', client_id=client.id) }}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create User</button>
                </div>
            </form>
        </div>
    </main>
</div>
{% endblock %}
