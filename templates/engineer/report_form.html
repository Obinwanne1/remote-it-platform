{% extends 'base.html' %}
{% block title %}Generate Report — {{ client.name }}{% endblock %}

{% block content %}
<div class="layout">
    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="{{ url_for('engineer.dashboard') }}" class="nav-item">&#8592; Dashboard</a>
            <a href="{{ url_for('engineer.client_detail', client_id=client.id) }}" class="nav-item">&#128188; {{ client.name }}</a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="page-header">
            <h2>Generate Report — {{ client.name }}</h2>
        </div>
        <div class="card" style="max-width:400px">
            <h3 class="card-title">Select Period</h3>
            <form method="GET" action="{{ url_for('engineer.report_pdf', client_id=client.id) }}">
                <div class="form-group">
                    <label class="form-label">Month</label>
                    <select name="month" class="form-control">
                        {% for m in range(1, 13) %}
                        <option value="{{ m }}" {% if m == current_month %}selected{% endif %}>
                            {{ ['January','February','March','April','May','June','July','August','September','October','November','December'][m-1] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Year</label>
                    <select name="year" class="form-control">
                        {% for y in range(current_year - 2, current_year + 1) %}
                        <option value="{{ y }}" {% if y == current_year %}selected{% endif %}>{{ y }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">&#128196; Download PDF Report</button>
            </form>
        </div>
    </main>
</div>
{% endblock %}
