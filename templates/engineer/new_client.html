{% extends 'base.html' %}
{% block title %}New Client{% endblock %}

{% block content %}
<div class="layout">
    <aside class="sidebar">
        <nav class="sidebar-nav">
            <a href="{{ url_for('engineer.dashboard') }}" class="nav-item">&#8592; Dashboard</a>
            <a href="{{ url_for('engineer.clients') }}" class="nav-item">&#128188; Clients</a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="page-header"><h2>Add New Client</h2></div>
        <div class="card form-card">
            <form method="POST">
                <div class="form-group">
                    <label>Company Name *</label>
                    <input type="text" name="name" required placeholder="Acme Corp">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" name="email" required placeholder="contact@acmecorp.com">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" placeholder="+1 555 123 4567">
                </div>
                <div class="form-group">
                    <label>AnyDesk ID</label>
                    <input type="text" name="anydesk_id" placeholder="123456789">
                    <small class="form-hint">Remote desktop ID for one-click connections.</small>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea name="notes" rows="3" placeholder="Network details, special instructions..."></textarea>
                </div>
                <div class="form-actions">
                    <a href="{{ url_for('engineer.clients') }}" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create Client</button>
                </div>
            </form>
        </div>
    </main>
</div>
{% endblock %}
